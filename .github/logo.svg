<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect x="0" y="0" width="200" height="200" rx="44" fill="#eaf1fb"/>

  <!-- spokes (drawn first, ends hidden under nodes) -->
