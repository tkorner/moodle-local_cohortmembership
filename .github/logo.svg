    <circle cx="136.8" cy="63.2" r="28" fill="#ffffff" stroke="#1a4d8c" stroke-width="4"/>
    <g transform="translate(136.8,63.2) scale(0.9)">
      <path d="M -9 14 Q -9 -2 0 -2 Q 9 -2 9 14 Z"/>
