    <circle cx="136.8" cy="136.8" r="28" fill="#ffffff" stroke="#1a4d8c" stroke-width="4"/>
    <g transform="translate(136.8,136.8) scale(0.9)">
      <path d="M -9 14 Q -9 -2 0 -2 Q 9 -2 9 14 Z"/>
      <circle cy="-7" r="6.5"/>
    </g>

    <circle cx="63.2" cy="136.8" r="28" fill="#ffffff" stroke="#1a4d8c" stroke-width="4"/>
    <g transform="translate(63.2,136.8) scale(0.9)">
      <path d="M -9 14 Q -9 -2 0 -2 Q 9 -2 9 14 Z"/>
      <circle cy="-7" r="6.5"/>
